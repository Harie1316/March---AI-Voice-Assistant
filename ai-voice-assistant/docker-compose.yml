# ──────────────────────────────────────────────
#  AI Voice Assistant — Docker Compose
#  Microservices architecture with optimised
#  audio chunking for real-time processing
# ──────────────────────────────────────────────

version: "3.9"

services:
  # ─── Main API Gateway ───
  api-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: vox-api-gateway
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
      - PORT=5000
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WORKER_THREADS=${WORKER_THREADS:-4}
      - MAX_CONCURRENT=${MAX_CONCURRENT:-50}
      - AUDIO_SAMPLE_RATE=${AUDIO_SAMPLE_RATE:-16000}
      - NOISE_REDUCTION_STRENGTH=${NOISE_REDUCTION_STRENGTH:-0.75}
    volumes:
      - audio-uploads:/tmp/voice_assistant_uploads
      - model-cache:/root/.cache
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 1G
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - vox-network

  # ─── Audio Preprocessing Worker ───
  audio-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: vox-audio-worker
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AUDIO_SAMPLE_RATE=${AUDIO_SAMPLE_RATE:-16000}
      - NOISE_REDUCTION_STRENGTH=${NOISE_REDUCTION_STRENGTH:-0.75}
    volumes:
      - audio-uploads:/tmp/voice_assistant_uploads
      - model-cache:/root/.cache
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    networks:
      - vox-network

  # ─── Redis Cache (for session & result caching) ───
  redis:
    image: redis:7-alpine
    container_name: vox-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - vox-network

  # ─── Nginx Reverse Proxy ───
  nginx:
    image: nginx:alpine
    container_name: vox-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vox-network

volumes:
  audio-uploads:
    driver: local
  model-cache:
    driver: local
  redis-data:
    driver: local

networks:
  vox-network:
    driver: bridge
